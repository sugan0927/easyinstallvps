name = "easyinstall-php"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
APP_NAME = "EasyInstallPHP"
APP_VERSION = "1.0.0"
GITHUB_REPO_OWNER = "your-username"
GITHUB_REPO_NAME = "your-repo-name"
GITHUB_BRANCH = "main"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }
